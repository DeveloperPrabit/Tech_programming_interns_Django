{% load static %}
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

<!-- Google Fonts for Font Style -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<!-- Custom Stylesheet -->
<link rel="stylesheet" href="{% static 'style.css' %}">

<style>
    /* Default text color */
    .navbar-nav .nav-link {
        color: rgba(92, 90, 90, 0.856) !important; /* Set default text color */
    }

    /* Lighter text color on hover */
    .navbar-nav .nav-link:hover {
        color: #bd9191 !important;  /* Light gray color */
    }
</style>

<header class="header-area my-4">
    <!-- Navbar Area -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white"> 
        <div class="container">
            <!-- Brand Logo -->
            <a class="navbar-brand" href="{% url 'home' %}">
                <img src="{% static 'img/core-img/logo.png' %}" alt="Logo" height="40">
            </a>

            <!-- Navbar Toggler (for mobile) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link fs-5 fw-medium" href="{% url 'home' %}" style="font-family: 'Roboto', sans-serif;">Home</a> 
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fs-5 fw-medium" href="" style="font-family: 'Roboto', sans-serif;">Politics</a> 
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fs-5 fw-medium" href="" style="font-family: 'Roboto', sans-serif;">Technology</a> 
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fs-5 fw-medium" href="" style="font-family: 'Roboto', sans-serif;">Sports</a> 
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fs-5 fw-medium" href="" style="font-family: 'Roboto', sans-serif;">Login</a> 
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fs-5 fw-medium" href="" style="font-family: 'Roboto', sans-serif;">Sign Up</a> 
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
